<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" font-family="serif">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&amp;family=Frijole&amp;family=IM+Fell+DW+Pica+SC&amp;family=Rozha+One&amp;display=swap');
      .base { font-family: 'Cinzel Decorative', serif; font-weight: 900; fill: #f5f5f0; }
      .bug-a { font-family: 'Frijole', cursive; fill: #f5f5f0; }
      .bug-e-low { font-family: 'IM Fell DW Pica SC', serif; font-weight: 700; fill: #f5f5f0; }
      .bug-e-block { font-family: 'Rozha One', serif; font-weight: 900; fill: none; stroke: #f5f5f0; stroke-width: 3; }
    </style>
  </defs>
  <g font-size="140" text-anchor="middle" dominant-baseline="alphabetic">
    <text class="base" x="55" y="150">C</text>
    <text class="bug-a" x="140" y="150" font-size="120">A</text>
    <text class="base" x="230" y="150">R</text>
    <text class="bug-e-low" x="315" y="150" font-size="105">e</text>
    <text class="base" x="395" y="150">E</text>
    <text class="base" x="485" y="150">R</text>
    
    <text class="bug-e-block" x="640" y="150">E</text>
    <text class="base" x="735" y="150">D</text>
    <text class="base" x="820" y="150">I</text>
    <text class="base" x="895" y="150">T</text>
  </g>
</svg>
